<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandOps | Live Agent Swarm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .accent-amber { color: #f59e0b; }
        .accent-cyan { color: #06b6d4; }
        
        #terminal { flex-grow: 1; overflow-y: auto; padding: 2rem; scroll-behavior: smooth; }
        .log-entry { opacity: 0; animation: fadeIn 0.3s forwards; margin-bottom: 0.75rem; line-height: 1.5; }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .role-system { color: #94a3b8; }
        .role-mechanic { color: #3b82f6; }
        .role-logistics { color: #10b981; }
        .role-flightops { color: #8b5cf6; }
        .role-crew { color: #eab308; }
        .role-faa { color: #ef4444; font-weight: bold; }
        .role-commander { color: #06b6d4; font-weight: bold; }
        
        .pulse-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="glass-panel flex-grow flex flex-col max-w-6xl w-full mx-auto overflow-hidden">
        
        <!-- Header -->
        <div class="border-b border-slate-700 bg-slate-800/50 p-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter">Band<span class="accent-amber">Ops</span> Dashboard</h1>
                <div class="font-mono text-sm text-slate-400 mt-1">Multi-Agent AOG Resolution Mesh</div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="font-mono text-sm border border-slate-600 px-3 py-1 rounded bg-slate-900">
                    COST METER: <span id="cost-meter" class="text-red-400 font-bold">$0</span>
                </div>
                <button id="start-btn" onclick="startDemo()" class="pulse-btn bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 px-6 rounded transition">
                    INJECT CHAOS EVENT
                </button>
            </div>
        </div>

        <!-- Terminal Output -->
        <div id="terminal" class="font-mono text-sm md:text-base">
            <div class="text-slate-500 mb-4">SYSTEM READY. WAITING FOR TRIGGER...</div>
        </div>
        
    </div>

    <script>
        const script = [
            { role: 'system', text: 'INITIATING AOG PROTOCOL: Aircraft Boeing 777 (Tail N1234) grounded at SEA.', delay: 500 },
            { role: 'system', text: 'Deploying Band Agent Swarm via Band SDK...', delay: 1000 },
            { role: 'mechanic', text: '[MECHANIC]: Engine #2 thrust reverser fault detected. Error code E-77X. MEL requires immediate replacement.', delay: 1500 },
            { role: 'logistics', text: '[SUPPLY CHAIN]: Searching global inventory. Part available in SEA warehouse, but locked. Alternative: LAX warehouse, flight departs in 1 hour.', delay: 2500 },
            { role: 'flightops', text: '[FLIGHT OPS]: If we route from LAX, flight delay is 4.5 hours. Estimated cost: $405,000.', delay: 2000 },
            { role: 'logistics', text: '[SUPPLY CHAIN]: Securing LAX part. Courier dispatched to gate.', delay: 1500 },
            { role: 'crew', text: '[CREW SCHEDULER]: Wait. A 4.5 hour delay puts Captain Miller over FAA max duty time by 15 minutes. We need a reserve crew.', delay: 2000 },
            { role: 'faa', text: '[FAA COMPLIANCE]: ADVERSARIAL AUDIT - Captain Miller cannot fly. FAR 117 violation imminent. Vetoing current crew plan.', delay: 1500 },
            { role: 'crew', text: '[CREW SCHEDULER]: Finding reserve... Reserve Captain Davis is available locally in SEA. Assigning to flight.', delay: 2500 },
            { role: 'faa', text: '[FAA COMPLIANCE]: Audit passed. New crew assignment complies with FAR 117.', delay: 1500 },
            { role: 'commander', text: '[COMMANDER]: SYNTHESIZING RESOLUTION PLAN.', delay: 2000 },
            { role: 'commander', text: '1. Source Part from LAX.\n2. Reassign Captain Davis.\n3. Delay flight by 4.5 hrs.', delay: 1000 },
            { role: 'system', text: 'AWAITING HUMAN-IN-THE-LOOP APPROVAL...', delay: 2000 },
            { role: 'system', text: 'HUMAN APPROVAL GRANTED.', delay: 3000 },
            { role: 'commander', text: '[COMMANDER]: Executing plan. Cryptographic hash written to immutable ledger.', delay: 1000 },
            { role: 'system', text: 'CRISIS RESOLVED. TOTAL TIME SAVED VS HUMAN: 4 HOURS.', delay: 1000 }
        ];

        let costInterval;
        let currentCost = 0;

        function updateScroll() {
            const term = document.getElementById('terminal');
            term.scrollTop = term.scrollHeight;
        }

        function appendLog(role, text) {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = `log-entry role-${role}`;
            // Handle newlines
            div.innerHTML = text.replace(/\n/g, '<br>&nbsp;&nbsp;&nbsp;');
            term.appendChild(div);
            updateScroll();
        }

        async function startDemo() {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').classList.remove('pulse-btn');
            document.getElementById('start-btn').innerText = 'SWARM ACTIVE';
            
            document.getElementById('terminal').innerHTML = '';
            appendLog('system', '--- CONNECTION ESTABLISHED WITH BAND API ---');

            // Start cost meter
            costInterval = setInterval(() => {
                currentCost += 250; // $250 per second = $15,000 / minute
                document.getElementById('cost-meter').innerText = '$' + currentCost.toLocaleString();
            }, 1000);

            for (const step of script) {
                await new Promise(r => setTimeout(r, step.delay));
                appendLog(step.role, step.text);
            }

            clearInterval(costInterval);
            document.getElementById('start-btn').innerText = 'RESOLUTION COMPLETE';
            document.getElementById('start-btn').classList.add('bg-cyan-600');
        }
    </script>
</body>
</html>
